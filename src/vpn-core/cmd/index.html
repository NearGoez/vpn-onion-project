<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧅 Onion VPN - Demo Interactiva de Seguridad</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0f1d;
            --card-dark: #121829;
            --accent-green: #00ffaa;
            --accent-red: #ff4a5a;
            --accent-blue: #00d2ff;
            --text-main: #f0f3f8;
            --text-muted: #8fa0b5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        header {
            background-color: var(--card-dark);
            padding: 20px 40px;
            border-bottom: 2px solid #1f2a45;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(45deg, var(--accent-green), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .badge {
            background: #1f2a45;
            color: var(--accent-blue);
            font-family: 'Fira Code', monospace;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            border: 1px solid #2d3f66;
        }

        .container {
            flex: 1;
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        /* Formulario */
        .input-card {
            background-color: var(--card-dark);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #1f2a45;
            display: flex;
            gap: 16px;
            align-items: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        input[type="text"] {
            flex: 1;
            background-color: #060914;
            border: 2px solid #1f2a45;
            border-radius: 10px;
            padding: 16px 20px;
            color: white;
            font-size: 16px;
            font-family: 'Outfit', sans-serif;
            transition: all 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.2);
        }

        button {
            background: linear-gradient(135deg, var(--accent-blue), #0072ff);
            color: white;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            padding: 16px 32px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 210, 255, 0.4);
        }

        /* Paneles */
        .workspace {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .panel {
            background-color: var(--card-dark);
            border-radius: 16px;
            padding: 30px;
            border: 1px solid #1f2a45;
            display: flex;
            flex-direction: column;
            gap: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        .panel-safe {
            border-top: 4px solid var(--accent-green);
        }

        .panel-unsafe {
            border-top: 4px solid var(--accent-red);
        }

        h2 {
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Animación de red */
        .network-flow {
            background-color: #060914;
            border-radius: 12px;
            height: 140px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            position: relative;
            border: 1px solid #151d33;
            overflow: hidden;
        }

        .node {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            z-index: 10;
        }

        .node-circle {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background-color: #121829;
            border: 2px solid #2d3f66;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            transition: all 0.3s;
        }

        .node-name {
            font-size: 12px;
            color: var(--text-muted);
        }

        .node-active .node-circle {
            background-color: var(--accent-green);
            border-color: var(--accent-green);
            color: var(--bg-dark);
            box-shadow: 0 0 20px var(--accent-green);
        }

        .node-active-unsafe .node-circle {
            background-color: var(--accent-red);
            border-color: var(--accent-red);
            color: white;
            box-shadow: 0 0 20px var(--accent-red);
        }

        .node-active-blue .node-circle {
            background-color: var(--accent-blue);
            border-color: var(--accent-blue);
            color: var(--bg-dark);
            box-shadow: 0 0 20px var(--accent-blue);
        }

        .flow-line {
            position: absolute;
            height: 4px;
            background-color: #1f2a45;
            top: 48px;
            left: 10%;
            right: 10%;
            z-index: 1;
        }

        .pulse {
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: var(--accent-blue);
            top: 44px;
            left: 10%;
            transform: translateX(-50%);
            z-index: 5;
            display: none;
            box-shadow: 0 0 10px var(--accent-blue);
        }

        /* Consola de logs */
        .console {
            flex: 1;
            background-color: #060914;
            border-radius: 12px;
            padding: 20px;
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            line-height: 1.6;
            overflow-y: auto;
            height: 250px;
            border: 1px solid #151d33;
        }

        .log-entry {
            margin-bottom: 8px;
            border-left: 3px solid #2d3f66;
            padding-left: 10px;
            color: var(--text-main);
            opacity: 0;
            transform: translateX(-10px);
            animation: fadeIn 0.3s forwards;
        }

        .log-entry.safe {
            border-color: var(--accent-green);
        }

        .log-entry.unsafe {
            border-color: var(--accent-red);
        }

        .log-entry.system {
            border-color: var(--accent-blue);
        }

        .log-entry.highlight {
            color: var(--accent-green);
            font-weight: 700;
        }

        .log-entry.warning {
            color: var(--accent-red);
            font-weight: 700;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>🧅 Onion VPN <span style="font-weight:300; font-size:16px;">| Proyecto Seguridad</span></h1>
        <div class="badge">IPC: DGRAM SOCK</div>
    </header>

    <div class="container">
        <!-- Input Principal -->
        <div class="input-card">
            <input type="text" id="messageInput" placeholder="Escribe el mensaje secreto que quieres enviar..." value="Examen de seguridad: Pedro y Denis">
            <button id="sendBtn">
                <span>Enviar Datos</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </button>
        </div>

        <!-- Paneles Comparativos -->
        <div class="workspace">
            <!-- PANEL SEGURO -->
            <div class="panel panel-safe">
                <h2>🟢 Túnel Seguro (Con Onion VPN)</h2>
                
                <div class="network-flow" id="safeFlow">
                    <div class="flow-line"></div>
                    <div class="pulse" id="safePulse"></div>
                    
                    <div class="node" id="safeNodeClient">
                        <div class="node-circle">C</div>
                        <div class="node-name">Cliente</div>
                    </div>
                    <div class="node" id="safeNode1">
                        <div class="node-circle">N1</div>
                        <div class="node-name">Nodo 1</div>
                    </div>
                    <div class="node" id="safeNode2">
                        <div class="node-circle">N2</div>
                        <div class="node-name">Nodo 2</div>
                    </div>
                    <div class="node" id="safeNode3">
                        <div class="node-circle">N3</div>
                        <div class="node-name">Nodo Exit</div>
                    </div>
                </div>

                <div class="console" id="safeConsole">
                    <div class="log-entry system">Listo para la transmisión encriptada.</div>
                </div>
            </div>

            <!-- PANEL INSEGURO -->
            <div class="panel panel-unsafe">
                <h2>🔴 Tráfico Inseguro (Sin VPN)</h2>

                <div class="network-flow" id="unsafeFlow">
                    <div class="flow-line"></div>
                    <div class="pulse" id="unsafePulse" style="background-color: var(--accent-red); box-shadow: 0 0 10px var(--accent-red);"></div>
                    
                    <div class="node" id="unsafeNodeClient">
                        <div class="node-circle">C</div>
                        <div class="node-name">Cliente</div>
                    </div>
                    <div class="node" id="unsafeNodeHacker">
                        <div class="node-circle">💀</div>
                        <div class="node-name" style="color: var(--accent-red);">Hacker (Wi-Fi)</div>
                    </div>
                    <div class="node" id="unsafeNodeDest">
                        <div class="node-circle">D</div>
                        <div class="node-name">Destino</div>
                    </div>
                </div>

                <div class="console" id="unsafeConsole">
                    <div class="log-entry system">Canal directo inseguro activo. Escuchando Wi-Fi...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        
        const safeConsole = document.getElementById('safeConsole');
        const unsafeConsole = document.getElementById('unsafeConsole');
        
        const safePulse = document.getElementById('safePulse');
        const unsafePulse = document.getElementById('unsafePulse');

        // Nodos seguros
        const snClient = document.getElementById('safeNodeClient');
        const sn1 = document.getElementById('safeNode1');
        const sn2 = document.getElementById('safeNode2');
        const sn3 = document.getElementById('safeNode3');

        // Nodos inseguros
        const unClient = document.getElementById('unsafeNodeClient');
        const unHacker = document.getElementById('unsafeNodeHacker');
        const unDest = document.getElementById('unsafeNodeDest');

        sendBtn.addEventListener('click', async () => {
            const message = messageInput.value.trim();
            if (!message) return;

            // Bloquear entrada mientras simula
            sendBtn.disabled = true;
            messageInput.disabled = true;

            // Limpiar consolas
            safeConsole.innerHTML = '<div class="log-entry system">Iniciando transmisión segura por la VPN...</div>';
            unsafeConsole.innerHTML = '<div class="log-entry system">Iniciando envío directo por Wi-Fi público...</div>';

            // Resetear estados visuales
            [snClient, sn1, sn2, sn3, unClient, unHacker, unDest].forEach(n => {
                n.classList.remove('node-active', 'node-active-unsafe', 'node-active-blue');
            });

            // Llamar al backend local en Go
            try {
                const response = await fetch(`/api/simulate?message=${encodeURIComponent(message)}`);
                const data = await response.json();
                
                // Ejecutar simulaciones visuales en paralelo
                runSafeSimulation(data.safe_steps);
                runUnsafeSimulation(message);
            } catch (err) {
                console.error("Error al hablar con Go:", err);
                addLog(safeConsole, "Error al conectar con el servidor Go.", "warning");
                sendBtn.disabled = false;
                messageInput.disabled = false;
            }
        });

        function addLog(consoleElement, text, type = '') {
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = text;
            consoleElement.appendChild(entry);
            consoleElement.scrollTop = consoleElement.scrollHeight;
        }

        // Simulación segura
        function runSafeSimulation(steps) {
            safePulse.style.display = 'block';
            safePulse.style.left = '10%';
            
            let delay = 0;
            
            // 1. Cliente captura y encripta
            setTimeout(() => {
                snClient.classList.add('node-active-blue');
                addLog(safeConsole, steps[0], 'system'); // Captura
            }, delay);

            delay += 1000;
            setTimeout(() => {
                addLog(safeConsole, steps[1], 'safe'); // Cifrado capa 3
            }, delay);

            delay += 800;
            setTimeout(() => {
                addLog(safeConsole, steps[2], 'safe'); // Cifrado capa 2
            }, delay);

            delay += 800;
            setTimeout(() => {
                addLog(safeConsole, steps[3], 'safe'); // Cifrado capa 1
                addLog(safeConsole, "Paquete final encriptado en 3 capas. Enviando...", 'system');
            }, delay);

            // Animar pulso de Cliente a Nodo 1
            delay += 1000;
            setTimeout(() => {
                animatePulse(safePulse, 10, 36);
                snClient.classList.remove('node-active-blue');
                sn1.classList.add('node-active');
                addLog(safeConsole, steps[4], 'safe'); // Nodo 1 procesa
            }, delay);

            // Animar pulso de Nodo 1 a Nodo 2
            delay += 1500;
            setTimeout(() => {
                animatePulse(safePulse, 36, 63);
                sn1.classList.remove('node-active');
                sn2.classList.add('node-active');
                addLog(safeConsole, steps[5], 'safe'); // Nodo 2 procesa
            }, delay);

            // Animar pulso de Nodo 2 a Nodo Exit
            delay += 1500;
            setTimeout(() => {
                animatePulse(safePulse, 63, 90);
                sn2.classList.remove('node-active');
                sn3.classList.add('node-active-blue');
                addLog(safeConsole, steps[6], 'safe'); // Nodo Exit procesa
            }, delay);

            delay += 1200;
            setTimeout(() => {
                addLog(safeConsole, steps[7], 'highlight'); // Mensaje descifrado
                
                // Finalizar simulación
                safePulse.style.display = 'none';
                sendBtn.disabled = false;
                messageInput.disabled = false;
            }, delay);
        }

        // Simulación insegura (Hacker Wi-Fi)
        function runUnsafeSimulation(originalMessage) {
            unsafePulse.style.display = 'block';
            unsafePulse.style.left = '10%';

            let delay = 0;

            setTimeout(() => {
                unClient.classList.add('node-active-unsafe');
                addLog(unsafeConsole, `[CLIENT] Enviando mensaje sin encriptar por el Wi-Fi...`, 'system');
            }, delay);

            // Animar pulso de Cliente a Hacker
            delay += 1200;
            setTimeout(() => {
                animatePulse(unsafePulse, 10, 50);
                unClient.classList.remove('node-active-unsafe');
                unHacker.classList.add('node-active-unsafe');
                addLog(unsafeConsole, `[Wi-Fi SNIFFER] ¡ALERTA! Interceptado paquete de red en tránsito.`, 'warning');
            }, delay);

            delay += 1000;
            setTimeout(() => {
                addLog(unsafeConsole, `[Wi-Fi HACKER] Contenido del paquete revelado: "${originalMessage}"`, 'warning');
                addLog(unsafeConsole, `[Wi-Fi HACKER] Dirección IP de origen detectada: 10.8.0.1 (Fácilmente rastreable)`, 'warning');
            }, delay);

            // Animar pulso de Hacker a Destino
            delay += 1500;
            setTimeout(() => {
                animatePulse(unsafePulse, 50, 90);
                unHacker.classList.remove('node-active-unsafe');
                unDest.classList.add('node-active');
                addLog(unsafeConsole, `[DESTINO] Paquete recibido de forma insegura.`, 'system');
            }, delay);

            delay += 1000;
            setTimeout(() => {
                unsafePulse.style.display = 'none';
            }, delay);
        }

        function animatePulse(pulseEl, startPct, endPct) {
            let current = startPct;
            pulseEl.style.left = `${current}%`;
            
            const interval = setInterval(() => {
                if (current >= endPct) {
                    clearInterval(interval);
                } else {
                    current += 2;
                    pulseEl.style.left = `${current}%`;
                }
            }, 30);
        }
    </script>
</body>
</html>
